<div class="section-title" id="collection">Latest Collection</div>

  <!-- BLACK -->
  <div class="shirt-card" data-shirt="Black">
    <div class="shirt-img">
      <picture>
        <source 
          type="image/webp"
          srcset="
          https://raw.githubusercontent.com/mtech740/nrx-app/main/images/black.webp 400w,
          https://raw.githubusercontent.com/mtech740/nrx-app/main/images/black.webp 800w,
          https://raw.githubusercontent.com/mtech740/nrx-app/main/images/black.webp 1200w"
          sizes="(max-width:768px) 100vw, 400px">

        <img 
          src="https://raw.githubusercontent.com/mtech740/nrx-app/main/images/black.png"
          alt="NRX Onyx Black"
          width="400"
          height="600"
          loading="lazy"
          decoding="async">
      </picture>
    </div>
    <div class="shirt-info">
      <div class="shirt-name">NRX Onyx Black</div>
      <div class="shirt-price">K180</div>
    </div>
  </div>
