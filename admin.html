<!DOCTYPE html>
<html>
<head>
  <title>NRX Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Inter', monospace;
      padding: 24px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #22c55e;
      margin-bottom: 24px;
      font-size: 1.8rem;
    }
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #111;
      border: 1px solid #2a2a2e;
      border-radius: 16px;
      padding: 16px 24px;
      text-align: center;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: #22c55e;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #888;
    }
    .refresh-btn {
      background: #3b82f6;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 24px;
      color: white;
    }
    .order-card {
      background: #0c0c0e;
      border: 1px solid #2a2a2e;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .order-card.pending {
      border-left: 4px solid #facc15;
    }
    .order-card.approved {
      border-left: 4px solid #22c55e;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
    }
    .order-id {
      font-family: monospace;
      color: #22c55e;
      font-weight: bold;
    }
    .status {
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .status-pending {
      background: #854d0e;
      color: #fef3c7;
    }
    .status-approved {
      background: #14532d;
      color: #bbf7d0;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin: 12px 0;
    }
    .info-item {
      font-size: 0.85rem;
    }
    .info-label {
      color: #888;
    }
    .screenshot-preview {
      margin: 12px 0;
      text-align: center;
    }
    .screenshot-preview img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid #333;
    }
    .approve-section {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .approve-section input {
      background: #1a1a1e;
      border: 1px solid #333;
      padding: 10px 16px;
      border-radius: 40px;
      color: white;
      flex: 1;
      min-width: 150px;
    }
    .approve-btn {
      background: #22c55e;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
    }
    .reward-badge {
      background: #1e3a2f;
      padding: 8px 12px;
      border-radius: 12px;
      margin-top: 12px;
      font-family: monospace;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 16px;
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      cursor: pointer;
      color: white;
    }
    .empty {
      text-align: center;
      padding: 40px;
      color: #888;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🔥 NRX Admin Dashboard</h1>
  
  <div class="stats" id="stats"></div>
  
  <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh Orders</button>
  
  <div id="orders"></div>
</div>

<div id="imageModal" class="modal" onclick="closeModal()">
  <span class="modal-close">&times;</span>
  <img id="modalImage" src="" alt="Screenshot">
</div>

<script>
  const SHEETBEST_URL = "https://api.sheetbest.com/sheets/e440b21b-2b2b-466e-8849-1fa3dc3124e6";
  
  let allOrders = [];
  
  async function loadOrders() {
    const ordersDiv = document.getElementById('orders');
    ordersDiv.innerHTML = '<div class="empty">⏳ Loading orders...</div>';
    
    try {
      // Try to fetch from SheetBest
      const response = await fetch(SHEETBEST_URL);
      const apiOrders = await response.json();
      
      if (apiOrders && apiOrders.length > 0) {
        allOrders = apiOrders;
        // Save to localStorage as backup
        localStorage.setItem('nrx_admin_orders', JSON.stringify(allOrders));
      } else {
        // Fallback to localStorage
        const localOrders = JSON.parse(localStorage.getItem('nrx_orders') || '[]');
        allOrders = localOrders;
      }
      
    } catch (error) {
      console.log("API error, using local storage:", error);
      const localOrders = JSON.parse(localStorage.getItem('nrx_orders') || '[]');
      allOrders = localOrders;
    }
    
    if (allOrders.length === 0) {
      ordersDiv.innerHTML = '<div class="empty">📭 No orders yet. Customers will appear here.</div>';
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Pending</div></div>
        <div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Approved</div></div>
      `;
      return;
    }
    
    const total = allOrders.length;
    const pending = allOrders.filter(o => o.Status === "Pending").length;
    const approved = allOrders.filter(o => o.Status === "Approved").length;
    
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Total Orders</div></div>
      <div class="stat-card"><div class="stat-number">${pending}</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-number">${approved}</div><div class="stat-label">Approved</div></div>
    `;
    
    ordersDiv.innerHTML = allOrders.map(order => `
      <div class="order-card ${order.Status === 'Pending' ? 'pending' : 'approved'}">
        <div class="order-header">
          <span class="order-id">📦 ${order["Order ID"]}</span>
          <span class="status ${order.Status === 'Pending' ? 'status-pending' : 'status-approved'}">${order.Status}</span>
        </div>
        <div class="info-grid">
          <div class="info-item"><span class="info-label">👤 Customer:</span> ${escapeHtml(order.Name)}</div>
          <div class="info-item"><span class="info-label">📞 Phone:</span> ${escapeHtml(order.Phone)}</div>
          <div class="info-item"><span class="info-label">📧 Email:</span> ${escapeHtml(order.Email || 'N/A')}</div>
          <div class="info-item"><span class="info-label">👕 Shirt:</span> ${escapeHtml(order.Shirt)}</div>
          <div class="info-item"><span class="info-label">📏 Size:</span> ${order.Size}</div>
          <div class="info-item"><span class="info-label">📍 Delivery:</span> ${order.Delivery}</div>
          <div class="info-item"><span class="info-label">💵 Payment:</span> ${order.Payment} | K${order.Amount}</div>
          <div class="info-item"><span class="info-label">🔗 Referral:</span> ${order["Referral Used"] || 'None'}</div>
        </div>
        ${order.Screenshot ? `<div class="screenshot-preview"><img src="${order.Screenshot.substring(0, 100)}" onclick="event.stopPropagation(); openModal('${order.Screenshot}')"><div style="font-size:0.7rem;">Click to enlarge</div></div>` : ''}
        
        ${order.Status === "Pending" ? `
          <div class="approve-section">
            <input type="text" id="reward-${order["Order ID"]}" placeholder="Reward Code (e.g., NRX-1001)">
            <input type="text" id="value-${order["Order ID"]}" placeholder="Reward Value (e.g., $0.20)">
            <button class="approve-btn" onclick="approveOrder('${order["Order ID"]}')">✅ Approve & Send Reward</button>
          </div>
        ` : `
          <div class="reward-badge">
            🎁 <strong>Reward Code:</strong> ${order["Reward Code"] || 'N/A'} | <strong>Value:</strong> ${order["Reward Value"] || 'N/A'}
          </div>
        `}
      </div>
    `).join('');
  }
  
  async function approveOrder(orderId) {
    const rewardCode = document.getElementById(`reward-${orderId}`).value.trim();
    const rewardValue = document.getElementById(`value-${orderId}`).value.trim();
    
    if (!rewardCode || !rewardValue) {
      alert('❌ Please enter both reward code and value');
      return;
    }
    
    // Update local orders
    let orders = JSON.parse(localStorage.getItem('nrx_orders') || '[]');
    orders = orders.map(o => {
      if (o["Order ID"] === orderId) {
        o.Status = "Approved";
        o["Reward Code"] = rewardCode;
        o["Reward Value"] = rewardValue;
      }
      return o;
    });
    localStorage.setItem('nrx_orders', JSON.stringify(orders));
    
    // Try to update SheetBest
    try {
      await fetch(`${SHEETBEST_URL}/Order ID/${orderId}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          "Status": "Approved",
          "Reward Code": rewardCode,
          "Reward Value": rewardValue
        })
      });
    } catch(e) {
      console.log("API update failed, but saved locally");
    }
    
    alert(`✅ Order ${orderId} approved!\n\nReward Code: ${rewardCode}\nReward Value: ${rewardValue}\n\nSend this to customer via WhatsApp.`);
    
    // Generate WhatsApp message
    const order = orders.find(o => o["Order ID"] === orderId);
    if (order && order.Phone) {
      const msg = `🔥 NRX DROP\n\n✅ Your order ${orderId} has been approved!\n\n🎁 Reward Code: ${rewardCode}\n💰 Value: ${rewardValue}\n\nTo claim your reward, go to the NRX website and enter your code in the Redeem tab.\n\nThank you for shopping with NRX! 🔥`;
      const whatsappUrl = `https://wa.me/${order.Phone.replace(/\s/g, '')}?text=${encodeURIComponent(msg)}`;
      if (confirm("Open WhatsApp to send reward code to customer?")) {
        window.open(whatsappUrl, "_blank");
      }
    }
    
    loadOrders();
  }
  
  function openModal(imgSrc) {
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImage");
    modal.style.display = "flex";
    modalImg.src = imgSrc;
  }
  
  function closeModal() {
    const modal = document.getElementById("imageModal");
    modal.style.display = "none";
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  loadOrders();
</script>
</body>
</html>
