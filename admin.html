<!DOCTYPE html>
<html>
<head>
  <title>NRX Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#050505; color:white; font-family:Arial; padding:20px;">

<h2>🔥 NRX Admin Dashboard</h2>

<button onclick="loadOrders()">🔄 Refresh Orders</button>

<div id="orders"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCqKfnf8HS--TEa_Zwd-hpu6CiZXaNhrOWK_5HY196__4BVa9HyCBkiwfuWozUKW4q/exec";

// ================= LOAD ORDERS =================
async function loadOrders() {
  const res = await fetch(SCRIPT_URL);
  const data = await res.json();

  let html = "";

  for (let i = 1; i < data.length; i++) {
    const row = data[i];

    html += `
      <div style="border:1px solid #333; padding:12px; margin:10px 0;">
        <b>${row[3]}</b> (${row[4]})<br>
        Shirt: ${row[6]} (${row[7]}) | Size ${row[8]}<br>
        Payment: ${row[10]} | K${row[11]}<br>
        Status: <b>${row[2]}</b><br><br>

        ${
          row[2] === "Pending"
          ? `<button onclick="approveOrder('${row[0]}')">✅ Approve</button>`
          : `<span style="color:lightgreen;">✔ Approved</span>`
        }
      </div>
    `;
  }

  document.getElementById("orders").innerHTML = html;
}


// ================= APPROVE ORDER =================
async function approveOrder(orderId) {

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "approve",
      orderId: orderId
    })
  });

  const result = await res.json();

  if (result.success) {

    // 🔥 OPEN WHATSAPP WITH CORRECT NUMBER
    window.open(result.whatsapp, "_blank");

    alert("✅ Approved & WhatsApp ready");

    loadOrders();

  } else {
    alert("❌ Error approving order");
  }
}

// AUTO LOAD
loadOrders();
</script>

</body>
</html>
