<!DOCTYPE html>
<html>
<head>
  <title>NRX Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #ffffff; font-family: 'Inter', monospace; padding: 24px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #22c55e; margin-bottom: 24px; font-size: 1.8rem; }
    .login-box { background: #0c0c0e; border: 1px solid #2a2a2e; border-radius: 20px; padding: 32px; max-width: 400px; margin: 100px auto; text-align: center; }
    .login-box input { background: #010101; border: 1px solid #2c2c30; padding: 14px 18px; border-radius: 16px; color: white; width: 100%; margin: 16px 0; font-size: 1rem; }
    .login-box button { background: #22c55e; border: none; padding: 14px; border-radius: 40px; font-weight: bold; cursor: pointer; width: 100%; }
    .error { color: #f87171; margin-top: 12px; }
    .stats { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { background: #111; border: 1px solid #2a2a2e; border-radius: 16px; padding: 16px 24px; text-align: center; }
    .stat-number { font-size: 2rem; font-weight: bold; color: #22c55e; }
    .stat-label { font-size: 0.8rem; color: #888; }
    .refresh-btn { background: #3b82f6; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; margin-bottom: 24px; color: white; }
    .order-card { background: #0c0c0e; border: 1px solid #2a2a2e; border-radius: 20px; padding: 20px; margin-bottom: 16px; }
    .order-card.pending { border-left: 4px solid #facc15; }
    .order-card.approved { border-left: 4px solid #22c55e; }
    .order-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .order-id { font-family: monospace; color: #22c55e; font-weight: bold; }
    .status { padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: bold; }
    .status-pending { background: #854d0e; color: #fef3c7; }
    .status-approved { background: #14532d; color: #bbf7d0; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 12px 0; }
    .info-item { font-size: 0.85rem; }
    .info-label { color: #888; }
    .screenshot-preview { margin: 12px 0; text-align: center; }
    .screenshot-preview img { max-width: 200px; max-height: 150px; border-radius: 12px; cursor: pointer; border: 1px solid #333; }
    .approve-section { margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .approve-section input { background: #1a1a1e; border: 1px solid #333; padding: 10px 16px; border-radius: 40px; color: white; flex: 1; min-width: 150px; }
    .approve-btn { background: #22c55e; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; }
    .reward-badge { background: #1e3a2f; padding: 8px 12px; border-radius: 12px; margin-top: 12px; font-family: monospace; }
    .whatsapp-btn { background: #25D366; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 600; margin-left: 12px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
    .modal img { max-width: 90%; max-height: 90%; border-radius: 16px; }
    .modal-close { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: white; }
    .empty { text-align: center; padding: 40px; color: #888; }
    .logout-btn { background: #ef4444; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 600; margin-bottom: 20px; color: white; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="container" id="adminContent" style="display: none;">
  <div class="admin-header">
    <h1>🔥 NRX Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
  <div class="stats" id="stats"></div>
  <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh Orders</button>
  <div id="orders"></div>
</div>
<div id="loginBox" class="login-box">
  <h2>🔐 Admin Access</h2>
  <p>Enter your 4-digit PIN to continue</p>
  <input type="password" id="adminPin" placeholder="Enter PIN" maxlength="4" inputmode="numeric">
  <button onclick="checkLogin()">Login</button>
  <div id="loginError" class="error"></div>
</div>
<div id="imageModal" class="modal" onclick="closeModal()">
  <span class="modal-close">&times;</span>
  <img id="modalImage" src="" alt="Screenshot">
</div>
<script>
  const ADMIN_PIN = "1234";
  const SHEETBEST_URL = "https://api.sheetbest.com/sheets/e440b21b-2b2b-466e-8849-1fa3dc3124e6";
  
  function checkLogin() {
    if (document.getElementById('adminPin').value === ADMIN_PIN) {
      localStorage.setItem('nrx_admin_logged_in', 'true');
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      loadOrders();
    } else {
      document.getElementById('loginError').innerHTML = '❌ Wrong PIN! Try again.';
    }
  }
  function logout() {
    localStorage.removeItem('nrx_admin_logged_in');
    document.getElementById('adminContent').style.display = 'none';
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminPin').value = '';
  }
  if (localStorage.getItem('nrx_admin_logged_in') === 'true') {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadOrders();
  }
  let allOrders = [];
  async function loadOrders() {
    const ordersDiv = document.getElementById('orders');
    ordersDiv.innerHTML = '<div class="empty">⏳ Loading orders...</div>';
    try {
      const response = await fetch(SHEETBEST_URL);
      const apiOrders = await response.json();
      allOrders = (apiOrders && apiOrders.length) ? apiOrders : JSON.parse(localStorage.getItem('nrx_orders') || '[]');
    } catch(e) {
      allOrders = JSON.parse(localStorage.getItem('nrx_orders') || '[]');
    }
    if (allOrders.length === 0) {
      ordersDiv.innerHTML = '<div class="empty">📭 No orders yet.</div>';
      document.getElementById('stats').innerHTML = `<div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Total Orders</div></div><div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Pending</div></div><div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Approved</div></div>`;
      return;
    }
    const total = allOrders.length, pending = allOrders.filter(o => o.Status === "Pending").length, approved = allOrders.filter(o => o.Status === "Approved").length;
    document.getElementById('stats').innerHTML = `<div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Total Orders</div></div><div class="stat-card"><div class="stat-number">${pending}</div><div class="stat-label">Pending</div></div><div class="stat-card"><div class="stat-number">${approved}</div><div class="stat-label">Approved</div></div>`;
    ordersDiv.innerHTML = allOrders.map(order => `
      <div class="order-card ${order.Status === 'Pending' ? 'pending' : 'approved'}">
        <div class="order-header"><span class="order-id">📦 ${order["Order ID"]}</span><span class="status ${order.Status === 'Pending' ? 'status-pending' : 'status-approved'}">${order.Status}</span></div>
        <div class="info-grid">
          <div class="info-item"><span class="info-label">👤 Customer:</span> ${escapeHtml(order.Name)}</div>
          <div class="info-item"><span class="info-label">📞 Phone:</span> ${escapeHtml(order.Phone)}</div>
          <div class="info-item"><span class="info-label">👕 Shirt:</span> ${escapeHtml(order.Shirt)}</div>
          <div class="info-item"><span class="info-label">📏 Size:</span> ${order.Size}</div>
          <div class="info-item"><span class="info-label">📍 Delivery:</span> ${order.Delivery}</div>
          <div class="info-item"><span class="info-label">💵 Payment:</span> ${order.Payment} | K${order.Amount}</div>
        </div>
        ${order.Screenshot ? `<div class="screenshot-preview"><img src="${order.Screenshot.substring(0,100)}" onclick="openModal('${order.Screenshot}')"><div style="font-size:0.7rem;">Click to enlarge</div></div>` : ''}
        ${order.Status === "Pending" ? `
          <div class="approve-section">
            <input type="text" id="reward-${order["Order ID"]}" placeholder="Reward Code (e.g., NRX-1001)">
            <input type="text" id="value-${order["Order ID"]}" placeholder="Reward Value (e.g., $0.20)">
            <button class="approve-btn" onclick="approveOrder('${order["Order ID"]}')">✅ Approve & Send Reward</button>
          </div>
        ` : `<div class="reward-badge">🎁 Reward Code: ${order["Reward Code"] || 'N/A'} | Value: ${order["Reward Value"] || 'N/A'}<button class="whatsapp-btn" onclick="sendRewardWhatsApp('${order["Order ID"]}', '${order["Reward Code"]}', '${order["Reward Value"]}', '${order.Phone}')">📱 Send via WhatsApp</button></div>`}
      </div>`).join('');
  }
  async function approveOrder(orderId) {
    const rewardCode = document.getElementById(`reward-${orderId}`).value.trim();
    const rewardValue = document.getElementById(`value-${orderId}`).value.trim();
    if (!rewardCode || !rewardValue) { alert('❌ Please enter both reward code and value'); return; }
    let orders = JSON.parse(localStorage.getItem('nrx_orders') || '[]');
    orders = orders.map(o => { if (o["Order ID"] === orderId) { o.Status = "Approved"; o["Reward Code"] = rewardCode; o["Reward Value"] = rewardValue; } return o; });
    localStorage.setItem('nrx_orders', JSON.stringify(orders));
    try { await fetch(`${SHEETBEST_URL}/Order ID/${orderId}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ "Status": "Approved", "Reward Code": rewardCode, "Reward Value": rewardValue }) }); } catch(e) {}
    const order = orders.find(o => o["Order ID"] === orderId);
    if (order && order.Phone) sendRewardWhatsApp(orderId, rewardCode, rewardValue, order.Phone);
    alert(`✅ Order ${orderId} approved!`); loadOrders();
  }
  function sendRewardWhatsApp(orderId, rewardCode, rewardValue, phone) {
    const msg = `🔥 NRX DROP 🔥\n\n✅ Your order ${orderId} has been APPROVED!\n\n🎁 REWARD CODE: ${rewardCode}\n💰 VALUE: ${rewardValue}\n\nTo claim your reward, go to the NRX website and enter your code in the Redeem tab.\n\nThank you for shopping with NRX! 🚀`;
    window.open(`https://wa.me/${phone.replace(/\s/g, '')}?text=${encodeURIComponent(msg)}`, "_blank");
  }
  function openModal(imgSrc) { document.getElementById("imageModal").style.display = "flex"; document.getElementById("modalImage").src = imgSrc; }
  function closeModal() { document.getElementById("imageModal").style.display = "none"; }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m==='&') return '&amp;'; if (m==='<') return '&lt;'; if (m==='>') return '&gt;'; return m; }); }
</script>
</body>
</html>
