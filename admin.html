<!DOCTYPE html>
<html>
<head>
  <title>NRX Admin</title>
  <style>
    body { background: #050505; color: white; font-family: monospace; padding: 20px; }
    .order { border: 1px solid #333; margin: 10px 0; padding: 15px; border-radius: 8px; background: #0a0a0c; }
    .pending { border-left: 4px solid #facc15; }
    .approved { border-left: 4px solid #22c55e; }
    button { background: #22c55e; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    input { background: #1a1a1e; border: 1px solid #333; padding: 8px; color: white; border-radius: 8px; width: 200px; margin-right: 10px; }
    h2 { color: #22c55e; margin-bottom: 20px; }
    .refresh-btn { background: #3b82f6; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h2>🔥 NRX Admin Dashboard</h2>
  <button class="refresh-btn" onclick="fetchOrders()">🔄 Refresh Orders</button>
  <div id="orders">Loading...</div>

  <script>
  // ✅ YOUR SHEET.BEST API URL
  const SHEETBEST_URL = "https://api.sheetbest.com/sheets/e440b21b-2b2b-466e-8849-1fa3dc3124e6";
  
  async function fetchOrders() {
    try {
      const response = await fetch(SHEETBEST_URL);
      const orders = await response.json();
      
      if (orders.length === 0) {
        document.getElementById('orders').innerHTML = '<p>No orders yet.</p>';
        return;
      }
      
      document.getElementById('orders').innerHTML = orders.map(order => `
        <div class="order ${order.Status === 'Pending' ? 'pending' : 'approved'}">
          <strong>📦 ${order["Order ID"]}</strong><br>
          👤 ${order.Name} | 📞 ${order.Phone}<br>
          👕 ${order.Shirt} | Size ${order.Size}<br>
          📍 ${order.Delivery} | 💵 ${order.Payment}<br>
          💰 Amount: K${order.Amount}<br>
          Status: <strong style="color:${order.Status === 'Pending' ? '#facc15' : '#22c55e'}">${order.Status}</strong><br>
          ${order.Status === "Pending" ? `
            <div style="margin-top:10px;">
              <input type="text" id="reward-${order["Order ID"]}" placeholder="Reward Code (e.g., NRX-1001)">
              <input type="text" id="value-${order["Order ID"]}" placeholder="Reward Value (e.g., $0.20)">
              <button onclick="approveOrder('${order["Order ID"]}')">✅ Approve Order</button>
            </div>
          ` : `
            <div style="color:#22c55e; margin-top:10px;">
              🎁 Reward Code: ${order["Reward Code"]} (${order["Reward Value"]})
            </div>
          `}
        </div>
      `).join('');
    } catch (error) {
      document.getElementById('orders').innerHTML = `<p>Error: ${error.message}</p>`;
    }
  }
  
  async function approveOrder(orderId) {
    const rewardCode = document.getElementById(`reward-${orderId}`).value.trim();
    const rewardValue = document.getElementById(`value-${orderId}`).value.trim();
    
    if (!rewardCode || !rewardValue) {
      alert('Please enter both reward code and value');
      return;
    }
    
    try {
      const response = await fetch(`${SHEETBEST_URL}/Order ID/${orderId}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          "Status": "Approved",
          "Reward Code": rewardCode,
          "Reward Value": rewardValue
        })
      });
      
      if (response.ok) {
        alert(`✅ Order ${orderId} approved!`);
        fetchOrders();
      } else {
        alert('Error approving order');
      }
    } catch (error) {
      alert('Error: ' + error.message);
    }
  }
  
  fetchOrders();
  </script>
</body>
</html>
